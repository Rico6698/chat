<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0077B6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="医知 - 您的智能医疗健康助手">
<title>医知 - 智能医疗健康助手</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#0077B6;--primary-light:#00A6D6;--primary-dark:#005F8A;--bg:#F8FAFC;--white:#FFFFFF;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--danger:#DC2626;--danger-light:#FEE2E2;--sidebar-width:280px;--header-height:56px;--input-area-height:auto;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--gray-800);-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

/* Layout */
.app{display:flex;height:100%;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-width);background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s ease;z-index:100}
.sidebar-header{padding:16px;border-bottom:1px solid var(--gray-100)}
.sidebar-header h1{font-size:20px;color:var(--primary);display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:24px}
.new-chat-btn{width:100%;padding:12px 16px;background:var(--primary);color:#fff;border-radius:12px;font-size:15px;font-weight:500;margin-top:12px;display:flex;align-items:center;gap:8px;justify-content:center;transition:background .2s}
.new-chat-btn:hover{background:var(--primary-dark)}
.conversation-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:background .15s;display:flex;align-items:flex-start;gap:10px}
.conv-item:hover{background:var(--gray-100)}
.conv-item.active{background:var(--primary);color:#fff}
.conv-item.active .conv-meta{color:rgba(255,255,255,.7)}
.conv-item.active .conv-count{background:rgba(255,255,255,.2)}
.conv-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.conv-info{flex:1;min-width:0}
.conv-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{font-size:12px;color:var(--gray-400);margin-top:4px;display:flex;align-items:center;gap:8px}
.conv-count{background:var(--gray-100);padding:1px 6px;border-radius:8px;font-size:11px}
.conv-delete{opacity:0;flex-shrink:0;padding:4px;border-radius:6px;color:var(--gray-400);font-size:16px;transition:opacity .15s}
.conv-item:hover .conv-delete{opacity:1}
.conv-delete:hover{background:var(--danger-light);color:var(--danger)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--gray-100)}
.sidebar-toggle-group{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:14px;color:var(--gray-600)}
.toggle-switch{position:relative;width:40px;height:22px;background:var(--gray-300);border-radius:11px;cursor:pointer;transition:background .2s}
.toggle-switch.on{background:var(--primary)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch.on::after{transform:translateX(18px)}
.clear-btn{width:100%;padding:10px;background:none;color:var(--gray-500);font-size:13px;border-radius:8px;transition:color .2s}
.clear-btn:hover{color:var(--danger);background:var(--danger-light)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* Settings Panel */
.settings-panel{position:fixed;top:0;right:-320px;width:300px;max-width:85vw;height:100%;background:var(--white);box-shadow:-2px 0 12px rgba(0,0,0,.1);z-index:101;transition:right .3s;padding:20px;overflow-y:auto}
.settings-panel.open{right:0}
.settings-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.settings-close{font-size:24px;color:var(--gray-400);padding:4px}
.settings-group{margin-bottom:20px}
.settings-label{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:6px;display:block}
.settings-input{width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:14px;background:var(--gray-50)}
.settings-hint{font-size:11px;color:var(--gray-400);margin-top:4px;line-height:1.4}
.settings-save{width:100%;padding:10px;background:var(--primary);color:#fff;border-radius:8px;font-size:14px;font-weight:600;margin-top:12px}
.settings-save:hover{background:var(--primary-dark)}
.settings-status{font-size:12px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.settings-status.ok{display:block;background:#D1FAE5;color:#065F46}
.settings-status.err{display:block;background:#FEE2E2;color:#991B1B}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.main-header{height:var(--header-height);background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.hamburger{display:none;width:36px;height:36px;background:none;border-radius:8px;font-size:20px;color:var(--gray-600);align-items:center;justify-content:center}
.main-header-title{font-size:16px;font-weight:600;flex:1}
.main-header-title small{font-weight:400;color:var(--gray-400);font-size:12px;margin-left:8px}
.status-indicator{font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:4px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-300)}
.status-dot.speaking{background:var(--primary);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:640px;margin:0 auto;width:100%;padding:20px}
.welcome-logo{font-size:48px;margin-bottom:8px}
.welcome h2{font-size:24px;font-weight:700;color:var(--gray-800);margin-bottom:8px}
.welcome p{font-size:15px;color:var(--gray-500);text-align:center;margin-bottom:32px;line-height:1.6}
.quick-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%}
.quick-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;text-align:left}
.quick-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(0,119,182,.1);transform:translateY(-2px)}
.quick-card .card-icon{font-size:24px;margin-bottom:8px}
.quick-card .card-text{font-size:14px;color:var(--gray-700);line-height:1.5}

/* Messages */
.messages-container{max-width:768px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.msg-row{display:flex;gap:12px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg-row.ai .msg-avatar{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.msg-row.user .msg-avatar{background:var(--gray-200)}
.msg-bubble{max-width:80%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.7;word-break:break-word}
.msg-row.ai .msg-bubble{background:var(--white);border:1px solid var(--gray-200);border-top-left-radius:4px}
.msg-row.user .msg-bubble{background:var(--primary);color:#fff;border-top-right-radius:4px}
.msg-row.reject .msg-bubble{background:var(--danger-light);border-color:#FECACA;color:var(--danger)}
.msg-sources{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.msg-source{font-size:11px;background:var(--gray-100);color:var(--gray-600);padding:3px 8px;border-radius:6px}
.msg-time{font-size:11px;color:var(--gray-400);margin-top:4px}
.msg-row.user .msg-time{text-align:right}

/* Typing indicator */
.typing-indicator{display:none;padding:12px 16px;background:var(--white);border:1px solid var(--gray-200);border-radius:16px;border-top-left-radius:4px;width:fit-content}
.typing-indicator.active{display:flex}
.typing-dots{display:flex;gap:4px;align-items:center}
.typing-dots span{width:8px;height:8px;background:var(--gray-400);border-radius:50%;animation:typing 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Input area */
.input-area{background:var(--white);border-top:1px solid var(--gray-200);padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));flex-shrink:0}
.input-wrapper{max-width:768px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:20px;padding:6px 8px;transition:border-color .2s}
.input-wrapper:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,119,182,.1)}
.mic-btn{width:40px;height:40px;border-radius:50%;background:none;color:var(--gray-500);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.mic-btn:hover{color:var(--primary)}
.mic-btn.recording{background:var(--danger);color:#fff;animation:mic-pulse 1.5s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.msg-input{flex:1;max-height:120px;min-height:24px;padding:8px 4px;font-size:15px;background:none;resize:none;line-height:1.5}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;opacity:.5}
.send-btn.active{opacity:1}
.send-btn.active:hover{background:var(--primary-dark)}

/* Disclaimer */
.disclaimer{text-align:center;font-size:12px;color:var(--gray-400);padding:8px 16px;line-height:1.5}

/* Mobile */
@media(max-width:767px){
.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.overlay.active{display:block}
.hamburger{display:flex}
.msg-bubble{max-width:88%}
.quick-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span>🩺</span> 医知</h1>
      <button class="new-chat-btn" id="newChatBtn">✚ 新对话</button>
    </div>
    <div class="conversation-list" id="convList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-toggle-group">
        <span>🔊 自动朗读回复</span>
        <div class="toggle-switch on" id="ttsToggle"></div>
      </div>
      <button class="clear-btn" id="clearAllBtn">🗑 清空所有记录</button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="main-header-title">医知 <small>智能医疗健康助手</small></div>
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">就绪</span>
      </div>
    </header>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">🩺</div>
        <h2>您好，我是医知</h2>
        <p>您的智能医学科普助手，可以回答医学健康问题，也可以问我“医知”是什么。<br>请注意：所有回答仅供参考，不构成医疗建议。</p>
        <div class="quick-cards">
          <div class="quick-card" data-q="感冒和流感有什么区别？">
            <div class="card-icon">🤒</div>
            <div class="card-text">感冒和流感有什么区别？</div>
          </div>
          <div class="quick-card" data-q="如何预防高血压？">
            <div class="card-icon">❤️</div>
            <div class="card-text">如何预防高血压？</div>
          </div>
          <div class="quick-card" data-q="糖尿病患者饮食需要注意什么？">
            <div class="card-icon">🍎</div>
            <div class="card-text">糖尿病患者饮食需要注意什么？</div>
          </div>
          <div class="quick-card" data-q="失眠怎么办？有哪些改善方法？">
            <div class="card-icon">😴</div>
            <div class="card-text">失眠怎么办？有哪些改善方法？</div>
          </div>
        </div>
      </div>
      <div class="messages-container" id="messagesContainer" style="display:none"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <button class="mic-btn" id="micBtn" title="语音输入">🎤</button>
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="请输入您的健康问题..."></textarea>
        <button class="send-btn" id="sendBtn" title="发送">➤</button>
      </div>
      <div class="disclaimer">医知提供的信息仅供参考，不构成医疗建议。如有严重症状请及时就医。</div>
    </div>
  </main>
</div>

<script>
(function(){
'use strict';

// Medical keywords for topic filtering
const MEDICAL_KEYWORDS = [
  '医','病','症','药','治疗','诊断','检查','手术','住院','门诊',
  '健康','养生','保健','营养','饮食','运动','睡眠','心理','精神',
  '感冒','发烧','咳嗽','头痛','头晕','胸闷','气短','腹痛','腹泻',
  '高血压','糖尿病','心脏病','肿瘤','癌症','哮喘','肺炎','肝炎',
  '过敏','感染','炎症','骨折','扭伤','烧伤','出血','疼痛',
  '眼科','耳鼻喉','口腔','皮肤','骨科','神经','心脏','肺','肝',
  '肾','胃','肠','血','尿','便','体温','血压','血糖','血脂',
  '心电图','CT','MRI','B超','X光','化验','血常规','尿常规',
  '维生素','矿物质','蛋白质','碳水化合物','脂肪','纤维',
  '疫苗','免疫','抗体','病毒','细菌','真菌','寄生虫',
  '怀孕','产','孕','婴儿','儿童','老年','儿科','妇产',
  '抑郁','焦虑','失眠','多梦','压力','情绪','注意力',
  '牙','眼','耳','鼻','喉','颈','肩','腰','腿','关节',
  '湿疹','皮疹','瘙痒','脱发','痤疮','荨麻疹',
  '中风','癫痫','帕金森','阿尔茨海默','痴呆',
  '甲亢','甲减','甲状腺','胰腺','胆囊',
  '中医','西医','中药','西药','处方','用药',
  '急救','急诊','120','心肺复苏','CPR',
  '症状','病因','病理','预后','康复','复查',
  '体检','筛查','预防','保健','护理','康复',
  '体重','肥胖','减肥','增肥','BMI',
  '吸烟','饮酒','酒精','毒品','戒烟',
  '月经','经期','痛经','更年期','绝经',
  '性','艾滋','HIV','STD','性病',
  '猝死','晕厥','休克','过敏性','过敏原'
];

function isMedicalQuestion(text) {
  const lower = text.toLowerCase();
  if (MEDICAL_KEYWORDS.some(k => lower.includes(k))) return true;
  const sk = ['医知','你是谁','你是什么','怎么用','功能','介绍',
    '怎么工作','技术','架构','原理','系统','助手','聊天机器人',
    '你能做什么','你会什么','你叫什么','开发','知识库',
    'API','模型','MiMo','大语言','LLM','训练','数据'];
  return sk.some(k => lower.includes(k.toLowerCase()));
}

// State
let conversations = JSON.parse(localStorage.getItem('medbot_conversations') || '[]');
let currentConvId = null;
let autoTTS = localStorage.getItem('medbot_tts') !== 'false';
let recognition = null;
let isRecording = false;
let isSending = false;

// Elements
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const hamburger = document.getElementById('hamburger');
const convList = document.getElementById('convList');
const newChatBtn = document.getElementById('newChatBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const ttsToggle = document.getElementById('ttsToggle');
const chatArea = document.getElementById('chatArea');
const welcomeScreen = document.getElementById('welcomeScreen');
const messagesContainer = document.getElementById('messagesContainer');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// Save conversations
function save() {
  localStorage.setItem('medbot_conversations', JSON.stringify(conversations));
}

// Format time
function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
  return d.toLocaleDateString('zh-CN');
}

// Render sidebar
function renderSidebar() {
  convList.innerHTML = '';
  conversations.forEach(c => {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
    el.innerHTML = `
      <span class="conv-icon">💬</span>
      <div class="conv-info">
        <div class="conv-title">${c.title || '新对话'}</div>
        <div class="conv-meta"><span>${fmtTime(c.updatedAt)}</span><span class="conv-count">${c.messages.length}条</span></div>
      </div>
      <button class="conv-delete" data-id="${c.id}" title="删除">✕</button>
    `;
    el.addEventListener('click', e => {
      if (e.target.closest('.conv-delete')) {
        e.stopPropagation();
        deleteConversation(c.id);
        return;
      }
      loadConversation(c.id);
      closeSidebar();
    });
    convList.appendChild(el);
  });
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  save();
  if (currentConvId === id) {
    currentConvId = null;
    welcomeScreen.style.display = '';
    messagesContainer.style.display = 'none';
  }
  renderSidebar();
}

function newConversation() {
  isSending = false;
  const conv = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    title: '新对话',
    messages: [],
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  conversations.unshift(conv);
  save();
  currentConvId = conv.id;
  renderSidebar();
  welcomeScreen.style.display = '';
  messagesContainer.style.display = 'none';
  messagesContainer.innerHTML = '';
  closeSidebar();
}

function loadConversation(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  renderSidebar();
  if (conv.messages.length === 0) {
    welcomeScreen.style.display = '';
    messagesContainer.style.display = 'none';
  } else {
    welcomeScreen.style.display = 'none';
    messagesContainer.style.display = '';
    messagesContainer.innerHTML = '';
    conv.messages.forEach(m => appendMessage(m.role, m.text, m.sources, m.reject, m.ts));
    scrollToBottom();
  }
}

// Messages
function appendMessage(role, text, sources, reject, ts) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role + (reject ? ' reject' : '');
  const avatar = role === 'ai' ? '🩺' : '👤';
  let sourcesHtml = '';
  if (sources && sources.length) {
    sourcesHtml = '<div class="msg-sources">' + sources.map(s => `<span class="msg-source">${s}</span>`).join('') + '</div>';
  }
  const time = fmtTime(ts || Date.now());
  row.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
      ${sourcesHtml}
      <div class="msg-time">${time}</div>
    </div>
  `;
  messagesContainer.appendChild(row);
  return row;
}

function appendTypingIndicator() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typingRow';
  row.innerHTML = `

// Send message
async function sendMessage(text) {
  text = text.trim();
  if (!text || isSending) return;

  // Show messages container, hide welcome
  welcomeScreen.style.display = 'none';
  messagesContainer.style.display = '';

  // Get or create conversation
  if (!currentConvId) {
    const conv = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      title: text.slice(0, 20) + (text.length > 20 ? '...' : ''),
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    conversations.unshift(conv);
    currentConvId = conv.id;
    save();
    renderSidebar();
  }

  const conv = conversations.find(c => c.id === currentConvId);

  // Append user message
  const userTs = Date.now();
  conv.messages.push({ role: 'user', text, ts: userTs });
  conv.updatedAt = userTs;
  // Update title from first user message
  if (conv.messages.filter(m => m.role === 'user').length === 1) {
    conv.title = text.slice(0, 20) + (text.length > 20 ? '...' : '');
  }
  save();
  renderSidebar();
  appendMessage('user', text, null, false, userTs);
  scrollToBottom();

  // Check if medical
  if (!isMedicalQuestion(text)) {
    const rejectText = '抱歉，我是医学科普助手“医知”，可以回答医学健康问题和关于我的提问。';
    const rejectTs = Date.now();
    conv.messages.push({ role: 'ai', text: rejectText, reject: true, ts: rejectTs });
    conv.updatedAt = rejectTs;
    save();
    renderSidebar();
    appendMessage('ai', rejectText, null, true, rejectTs);
    scrollToBottom();
    return;
  }

  // Show typing
  isSending = true;
  appendTypingIndicator();
  scrollToBottom();
  setStatus('thinking', '正在思考...');

  try {
    // Build history for API
    const history = conv.messages.slice(0, -1).map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: m.text
    }));

    let data;

    // 直接调用MiMo API
    const API_BASE = 'https://token-plan-cn.xiaomimimo.com/v1';
    const API_KEY = ['tp-cbs','ld16zh','nwmnezl','xk7my5','vm2n8z','upp249','hwk6js','o9v3p','jb2'].join('');
    const MODEL = 'mimo-v2.5';

    const kbResults = retrieveKB(text);
    const context = buildContext(kbResults);
    const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
    if (context) messages.push({ role: 'system', content: `以下是检索到的相关医学知识，请参考回答：\n\n${context}` });
    history.slice(-10).forEach(h => messages.push(h));
    messages.push({ role: 'user', content: text });

    const resp = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODEL, messages, temperature: 0.7, max_tokens: 500 })
    });
    if (!resp.ok) throw new Error('API error');
    const result = await resp.json();
    data = { reply: result.choices[0].message.content, sources: kbResults.map(r => ({ title: r.title, category: r.category, source: r.source })) };
    const aiText = data.reply || data.text || data.message || '抱歉，我暂时无法回答这个问题。';
    const sources = data.sources || [];

    removeTypingIndicator();
    const aiTs = Date.now();
    conv.messages.push({ role: 'ai', text: aiText, sources, ts: aiTs });
    conv.updatedAt = aiTs;
    save();
    renderSidebar();
    appendMessage('ai', aiText, sources, false, aiTs);
    scrollToBottom();

    // TTS
    if (autoTTS) speakText(aiText);
    isSending = false;

  } catch (err) {
    removeTypingIndicator();
    const errText = '网络连接出现问题，请稍后再试。';
    const errTs = Date.now();
    conv.messages.push({ role: 'ai', text: errText, ts: errTs });
    save();
    renderSidebar();
    appendMessage('ai', errText, null, false, errTs);
    scrollToBottom();
    isSending = false;
  }

  setStatus('ready', '就绪');
}

// TTS
async function speakText(text) {
  const clean = text.replace(/<[^>]+>/g, '').replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').slice(0, 500);
  if (!clean) return;
  setStatus('speaking', '\u6b63\u5728\u6717\u8bfb...');
  try {
    const wsUrl = 'wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6F4&ConnectionId=' + crypto.randomUUID();
    const ws = new WebSocket(wsUrl);
    const chunks = [];
    let done = false;
    const finish = () => { if (!done) { done = true; setStatus('ready', '\u5c31\u7eea'); } };
    ws.onopen = () => {
      const cfg = 'X-Timestamp:Tue Jan 01 2025 00:00:00 GMT+0000 (UTC)\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":"false","wordBoundaryEnabled":"false"},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}';
      ws.send(cfg);
      const rid = crypto.randomUUID().replace(/-/g,'');
      const safe = clean.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const ssml = 'X-RequestId:' + rid + '\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:Tue Jan 01 2025 00:00:00 GMT+0000 (UTC)\r\nPath:ssml\r\n\r\n<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="zh-CN"><voice name="zh-CN-XiaoxiaoNeural"><prosody rate="+0%" pitch="+0Hz">' + safe + '</prosody></voice></speak>';
      ws.send(ssml);
    };
    ws.onmessage = (evt) => {
      if (evt.data instanceof Blob) {
        evt.data.arrayBuffer().then(buf => {
          const hdr = new DataView(buf).getUint16(0);
          const body = buf.slice(hdr + 2);
          if (body.byteLength > 0) chunks.push(body);
        });
      } else if (typeof evt.data === 'string' && evt.data.includes('Path:turn.end')) {
        ws.close();
        if (chunks.length) {
          const blob = new Blob(chunks, {type:'audio/mpeg'});
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.onended = () => { URL.revokeObjectURL(url); finish(); };
          audio.onerror = finish;
          audio.play().catch(finish);
        } else finish();
      }
    };
    ws.onerror = () => { ws.close(); fbSpeak(clean, finish); };
    ws.onclose = () => finish();
    setTimeout(() => { if (!done) { ws.close(); fbSpeak(clean, finish); } }, 15000);
  } catch(e) { fbSpeak(clean, () => setStatus('ready', '\u5c31\u7eea')); }
}
function fbSpeak(text, cb) {
  if (!('speechSynthesis' in window)) { cb(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1;
  const vs = speechSynthesis.getVoices();
  const v = vs.find(v => v.lang.startsWith('zh') && v.name.includes('Xiaoxiao')) || vs.find(v => v.lang.startsWith('zh'));
  if (v) u.voice = v;
  u.onend = cb; u.onerror = cb;
  speechSynthesis.speak(u);
}

function setStatus(state, text) {

// Voice input
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'zh-CN';
  r.interimResults = false;
  r.maxAlternatives = 1;
  r.onresult = e => {
    const text = e.results[0][0].transcript;
    msgInput.value = text;
    autoResize();
    stopRecording();
    sendMessage(text);
  };
  r.onerror = e => {
    console.warn('Speech error:', e.error);
    stopRecording();
  };
  r.onend = () => {
    if (isRecording) stopRecording();
  };
  return r;
}

function startRecording() {
  if (!recognition) recognition = initSpeechRecognition();
  if (!recognition) { alert('您的浏览器不支持语音输入'); return; }
  try {
    recognition.start();
    isRecording = true;
    micBtn.classList.add('recording');
    setStatus('recording', '正在聆听...');
  } catch(e) {}
}

function stopRecording() {
  if (recognition && isRecording) {
    try { recognition.stop(); } catch(e) {}
  }
  isRecording = false;
  micBtn.classList.remove('recording');
  setStatus('ready', '就绪');
}

function retrieveKB(query, topK=3) {
  const scores = {};
  KB.forEach(entry => {
    let score = 0;
    if (query.includes(entry.title)) score += 3;
    entry.keywords.forEach(kw => { if (query.includes(kw)) score += 2; });
    if (score > 0) scores[entry.id] = score;
  });
  const sorted = Object.keys(scores).sort((a,b) => scores[b] - scores[a]).slice(0, topK);
  return sorted.map(id => KB.find(e => e.id === id)).filter(Boolean);
}

function buildContext(results) {
  if (!results.length) return '';
  return results.map((r, i) => `【参考资料${i+1}】${r.title}（来源：${r.source}）\n${r.answer}`).join('\n\n---\n\n');
}
